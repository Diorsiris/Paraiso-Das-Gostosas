<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraíso das Gostosas - VIP</title>
    <style>
        :root {
            --rosa-choque: #ff0055;
            --preto-fundo: #0a0a0a;
            --preto-card: #141414;
            --ouro: #ffd700;
            --verde-online: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body { background: var(--preto-fundo); color: white; display: flex; justify-content: center; min-height: 100vh; }

        .main-wrapper { width: 100%; max-width: 450px; background: #000; position: relative; }

        /* CABEÇALHO DO CHAT (ONLINE STATUS) */
        .chat-header {
            background: var(--preto-card);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .profile-pic-container { position: relative; width: 45px; height: 45px; }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--rosa-choque);
        }

        .online-status {
            width: 12px;
            height: 12px;
            background: var(--verde-online);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--preto-card);
        }

        .header-info { margin-left: 12px; }
        .header-info h2 { font-size: 1rem; color: white; }
        .header-info span { font-size: 0.75rem; color: var(--verde-online); }

        /* LOGOTIPO */
        .logo-container { text-align: center; padding: 20px; }
        .logo-img { 
            width: 100%; 
            max-width: 280px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
        }

        /* ÁREA DE MENSAGENS */
        .chat-box {
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .bot { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background: var(--rosa-choque); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        /* LISTA DE PACIENTES */
        .grid-pacotes { padding: 15px; display: grid; gap: 8px; }

        .button-pacote {
            width: 100%;
            padding: 14px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .button-pacote:hover { border-color: var(--rosa-choque); background: rgba(255, 0, 85, 0.05); }
        .price-tag { color: var(--ouro); font-weight: bold; font-size: 0.9rem; }

        /* PAGAMENTO */
        #payment-area {
            display: none;
            padding: 20px;
            background: var(--preto-card);
            margin: 15px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .express-card { background: #000; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed var(--ouro); }
        .num { font-size: 1.4rem; color: var(--ouro); display: block; margin: 5px 0; letter-spacing: 1px; }

        .btn-wa {
            display: block;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="chat-header">
        <div class="profile-pic-container">
            <img src="https://i.ibb.co/LDPshG7H/5c0cb8de-4160-4236-8ecd-a4a42a708d58.jpg" class="profile-pic" alt="Atendente">
            <div class="online-status"></div>
        </div>
        <div class="header-info">
            <h2>Atendente VIP</h2>
            <span>online agora</span>
        </div>
    </div>

    <div class="logo-container">
        <img src="https://i.ibb.co/LDPshG7H/5c0cb8de-4160-4236-8ecd-a4a42a708d58.jpg" class="logo-img" alt="Logo">
    </div>

    <div class="chat-box" id="chat">
        <div class="message bot">Olá! Bem-vindo ao Paraíso. 🔥<br><br>Qual conteúdo você deseja libertar hoje por apenas <b>500 Kz</b>?</div>
    </div>

    <div class="grid-pacotes" id="pacotes-container"></div>

    <div id="payment-area">
        <h3 style="color:var(--rosa-choque);">💳 Pagamento via Express</h3>
        <div class="express-card">
            <p style="font-size: 0.8rem; color: #bbb;">Número para transferência:</p>
            <b class="num">947976177</b>
            <small style="color: #888;">Titular: Paraíso das Gostosas</small>
        </div>
        <p id="msg-final" style="font-size: 0.85rem; color: #ccc; margin-bottom: 15px;"></p>
        <a id="whatsappLink" href="#" target="_blank" class="btn-wa">
            💬 Enviar Comprovativo no WhatsApp
        </a>
    </div>
</div>

<script>
    const pacotes = [
        "Cláudia Costa", "THAYARA", "Winnie", 
        "Londrina Kelly", "Eliana Cravid", 
        "Letícia", "Fernanda"
    ];

    const chat = document.getElementById("chat");
    const container = document.getElementById("pacotes-container");
    const paymentArea = document.getElementById("payment-area");

    function addMessage(text, type){
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function escolher(nome){
        addMessage(`Quero o pacote da <b>${nome}</b>! 🔥`, "user");

        setTimeout(()=>{
            addMessage(`Ótima escolha! O conteúdo da <b>${nome}</b> é imperdível.`, "bot");
            
            setTimeout(()=>{
                addMessage("Efetue o pagamento de <b>500 Kz</b> via Express e envie o comprovativo abaixo para eu te mandar o link.", "bot");
                
                // Configuração do WhatsApp
                const numero = "244956649781";
                const textoWA = `Olá 👋\n\nFiz o pagamento de 500 Kz do pacote: *${nome}*\n\nSegue o comprovativo para libertar o meu acesso.`;
                document.getElementById("whatsappLink").href = `https://wa.me/${numero}?text=${encodeURIComponent(textoWA)}`;
                
                document.getElementById("msg-final").innerText = `📌 Você selecionou o pacote de ${nome}.`;
                paymentArea.style.display = "block";
                
                // Scroll automático para o pagamento
                setTimeout(() => {
                    paymentArea.scrollIntoView({ behavior: 'smooth' });
                }, 300);
            }, 800);
        }, 600);
    }

    pacotes.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "button-pacote";
        btn.innerHTML = `<span>${p}</span> <span class="price-tag">500 Kz</span>`;
        btn.onclick = () => escolher(p);
        container.appendChild(btn);
    });
</script>

</body>
</html>
