<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraíso VIP</title>
    <style>
        :root {
            --rosa-choque: #ff1493; 
            --preto-puro: #000000;
            --preto-card: #0a0a0a;
            --verde-wa: #25d366;
            --texto: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body { background: var(--preto-puro); color: var(--texto); display: flex; justify-content: center; min-height: 100vh; }

        .main-wrapper { width: 100%; max-width: 450px; background: var(--preto-puro); }

        /* CABEÇALHO COM FOTO FEMININA E STATUS VERDE */
        .chat-header {
            background: var(--preto-card);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--rosa-choque);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .profile-pic-container { position: relative; width: 48px; height: 48px; }

        .profile-pic {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--rosa-choque);
        }

        .online-status {
            width: 14px; height: 14px; background: var(--verde-wa);
            border-radius: 50%; position: absolute; bottom: 1px; right: 1px;
            border: 2px solid var(--preto-card);
            box-shadow: 0 0 8px var(--verde-wa);
        }

        .header-info { margin-left: 15px; }
        .header-info h2 { font-size: 1.05rem; color: #fff; }
        .header-info span { font-size: 0.8rem; color: var(--verde-wa); font-weight: bold; }

        /* CHAT */
        .chat-box {
            padding: 20px 15px; height: 350px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
        }

        .message { max-width: 80%; padding: 14px; border-radius: 20px; font-size: 0.95rem; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; }
        .user { background: var(--rosa-choque); align-self: flex-end; color: #fff; font-weight: bold; }

        /* BOTÕES DE PACIENTES */
        .grid-pacotes { padding: 15px; display: grid; gap: 10px; }

        .button-pacote {
            width: 100%; padding: 16px; background: transparent;
            border: 1px solid var(--rosa-choque); border-radius: 15px;
            color: #fff; display: flex; justify-content: space-between;
            cursor: pointer; transition: 0.3s;
        }

        .button-pacote:hover { background: var(--rosa-choque); }
        .price-tag { color: var(--rosa-choque); font-weight: bold; }
        .button-pacote:hover .price-tag { color: #fff; }

        /* ÁREA DE PAGAMENTO */
        #payment-area {
            display: none; padding: 25px; background: var(--preto-card);
            margin: 15px; border-radius: 25px; border: 1px solid var(--rosa-choque);
            text-align: center; animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .express-card { 
            background: #000; padding: 20px; border-radius: 15px; 
            margin: 20px 0; border: 2px dashed var(--rosa-choque); 
        }

        .num { font-size: 1.6rem; color: var(--rosa-choque); display: block; margin: 10px 0; font-weight: 800; }

        /* BOTÃO DO WHATSAPP VERDE */
        .btn-wa {
            display: block; background: var(--verde-wa); color: #fff;
            text-decoration: none; padding: 18px; border-radius: 35px;
            font-weight: bold; margin-top: 15px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="chat-header">
        <div class="profile-pic-container">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=150&auto=format&fit=crop" class="profile-pic">
            <div class="online-status"></div>
        </div>
        <div class="header-info">
            <h2>Paraíso Das Gostosas</h2>
            <span>online agora</span>
        </div>
    </div>

    <div class="chat-box" id="chat">
        <div class="message bot">Olá! Bem-vindo ao Paraíso. 🔥<br><br>Qual conteúdo você deseja libertar hoje por apenas <b>500 Kz</b>?</div>
    </div>

    <div class="grid-pacotes" id="pacotes-container"></div>

    <div id="payment-area">
        <h3 style="color:var(--rosa-choque);">💳 PAGAMENTO EXPRESS</h3>
        <div class="express-card">
            <b class="num">947976177</b>
            <span style="color:#888; font-size: 0.8rem;">Titular: Paraíso das Gostosas</span>
        </div>
        <p id="msg-final" style="font-size: 0.9rem; margin-bottom: 15px;"></p>
        <a id="whatsappLink" href="#" target="_blank" class="btn-wa">💬 ENVIAR COMPROVATIVO NO WHATSAPP</a>
    </div>
</div>

<script>
    const pacotes = ["Cláudia Costa", "THAYARA", "Winnie", "Londrina Kelly", "Eliana Cravid", "Letícia", "Fernanda"];
    const chat = document.getElementById("chat");
    const container = document.getElementById("pacotes-container");

    function addMessage(text, type){
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function escolher(nome){
        addMessage(`Quero o pacote da <b>${nome}</b>! 🔥`, "user");
        setTimeout(()=>{
            addMessage(`Excelente escolha! Efetue o pagamento de <b>500 Kz</b> via Express e envie o comprovativo.`, "bot");
            const numero = "244956649781";
            const textoWA = `Olá! Fiz o pagamento de 500 Kz do pacote: *${nome}*`;
            document.getElementById("whatsappLink").href = `https://wa.me/${numero}?text=${encodeURIComponent(textoWA)}`;
            document.getElementById("msg-final").innerHTML = `📌 Pacote selecionado: <b>${nome}</b>`;
            document.getElementById("payment-area").style.display = "block";
        }, 600);
    }

    pacotes.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "button-pacote";
        btn.innerHTML = `<span>${p}</span> <span class="price-tag">500 Kz</span>`;
        btn.onclick = () => escolher(p);
        container.appendChild(btn);
    });
</script>
</body>
</html>
